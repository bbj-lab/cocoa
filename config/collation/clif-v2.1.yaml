
# This file defines how to extract events from CLIF tables and produce a denormalized MEDS-like parquet.


# ============================================================================
# Identifiers and Grouping
# ============================================================================
subject_id: hospitalization_id  # Each hospitalization is a subject
group_id: patient_id            # Multiple hospitalizations per patient

# ============================================================================
# Subject Splits (chronological by admission_dttm)
# ============================================================================
subject_splits:
  train_frac: 0.7
  tuning_frac: 0.1
  #max_subjects: 100  # Test with 100 subjects only

# ============================================================================
# Reference Table (primary table with time windows)
# ============================================================================
reference:
  table: clif_hospitalization
  start_time: admission_dttm
  end_time: discharge_dttm
  with_col_expr: >-
          pl.when(pl.col("age_at_admission") < 30).then(pl.lit("18-29"))
          .when(pl.col("age_at_admission") < 40).then(pl.lit("30-39"))
          .when(pl.col("age_at_admission") < 50).then(pl.lit("40-49"))
          .when(pl.col("age_at_admission") < 60).then(pl.lit("50-59"))
          .when(pl.col("age_at_admission") < 70).then(pl.lit("60-69"))
          .when(pl.col("age_at_admission") < 80).then(pl.lit("70-79"))
          .otherwise(pl.lit("80+"))
          .alias("age_bucket")
          
  # Join patient demographics onto hospitalization
  augmentation_tables:
    - table: clif_patient
      key: patient_id
      validation: "m:1"
      


# ============================================================================
# Entries (event extraction rules)
# ============================================================================
entries:
  # --------------------------------------------------------------------------
  # DEMOGRAPHICS (from reference frame at admission)
  # --------------------------------------------------------------------------
  - table: REFERENCE
    prefix: DEMO
    code: age_bucket
    time: admission_dttm
    
  - table: REFERENCE
    prefix: DEMO
    code: sex_category
    time: admission_dttm
    
  - table: REFERENCE
    prefix: DEMO
    code: race_category
    time: admission_dttm
    
  - table: REFERENCE
    prefix: ADMN
    code: admission_type_category
    time: admission_dttm
  # --------------------------------------------------------------------------
  # ADT (Admission/Discharge/Transfer events)
  # --------------------------------------------------------------------------
  - table: clif_adt
    prefix: ADT
    code: location_category
    time: in_dttm
    reference_key: hospitalization_id

  # --------------------------------------------------------------------------
  # VITAL SIGNS
  # --------------------------------------------------------------------------
  - table: clif_vitals
    prefix: VTL
    code: vital_category
    numeric_value: vital_value
    time: recorded_dttm
    reference_key: hospitalization_id

  # --------------------------------------------------------------------------
  # LABS - Order Event
  # --------------------------------------------------------------------------
  - table: clif_labs
    prefix: LAB-ORD
    code: lab_category
    time: lab_order_dttm
    reference_key: hospitalization_id
    filter_expr: pl.col("lab_order_dttm").is_not_null()

  # --------------------------------------------------------------------------
  # LABS - Result Event (with numeric value)
  # --------------------------------------------------------------------------
  - table: clif_labs
    prefix: LAB-RES
    code: lab_category
    numeric_value: lab_value_numeric
    time: lab_result_dttm
    reference_key: hospitalization_id
    filter_expr: 
      - pl.col("lab_result_dttm").is_not_null()
      - pl.col("lab_value_numeric").is_not_null()

